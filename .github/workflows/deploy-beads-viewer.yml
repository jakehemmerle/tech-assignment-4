name: Deploy Beads Viewer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '.beads/issues.jsonl'
      - '.github/workflows/deploy-beads-viewer.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bv
        run: |
          BV_VERSION="0.15.2"
          curl -sL "https://github.com/Dicklesworthstone/beads_viewer/releases/download/v${BV_VERSION}/bv_${BV_VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin bv
          chmod +x /usr/local/bin/bv
          bv -version

      - name: Generate static site
        run: |
          bv -export-pages ./bv-pages \
            -pages-title "Poker Rewards Generic2 — Beads Tracker" \
            -pages-include-closed
        working-directory: ${{ github.workspace }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./bv-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
